<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <!-- Left Lens Clip -->
    <clipPath id="left-lens">
      <path d="M 7 24 Q 18 20, 28 24 L 26 42 Q 18 47, 9 42 Z" />
    </clipPath>

    <!-- Right Lens Clip -->
    <clipPath id="right-lens">
      <path d="M 36 24 Q 46 20, 57 24 L 55 42 Q 46 47, 38 42 Z" />
    </clipPath>

    <!-- Vibrant Gradient for Lenses -->
    <linearGradient id="code-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
  </defs>

  <!-- Left Lens Content -->
  <g clip-path="url(#left-lens)">
    <!-- Dark Tech Lens Background -->
    <rect x="0" y="15" width="32" height="35" fill="#0D1117" />
    <!-- Blue Glow Gradient -->
    <circle cx="18" cy="33" r="14" fill="url(#code-grad)" opacity="0.3" />
    <!-- Opening Code Bracket '<' reflected in lens -->
    <path d="M 21 28 L 14 33 L 21 38" 
          fill="none" stroke="#00F2FE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Right Lens Content -->
  <g clip-path="url(#right-lens)">
    <!-- Dark Tech Lens Background -->
    <rect x="32" y="15" width="32" height="35" fill="#0D1117" />
    <!-- Blue Glow Gradient -->
    <circle cx="46" cy="33" r="14" fill="url(#code-grad)" opacity="0.3" />
    <!-- Closing Code Bracket '>' reflected in lens -->
    <path d="M 43 28 L 50 33 L 43 38" 
          fill="none" stroke="#00F2FE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Sunglasses Frame -->
  <path d="M 4 21 Q 18 16, 29 22 L 35 22 Q 46 16, 60 21 Q 62 27, 57 43 Q 46 50, 36 43 L 34 25 Q 32 24, 30 25 L 28 43 Q 18 50, 7 43 Q 2 27, 4 21 Z" 
        fill="#161B22" stroke="#30363D" stroke-width="2" stroke-linejoin="round" />

  <!-- Bridge -->
  <path d="M 28 23 Q 32 20, 36 23" 
        fill="none" stroke="#30363D" stroke-width="2.5" stroke-linecap="round" />

  <!-- Top Glass Highlight -->
  <path d="M 8 23 L 22 21" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  <path d="M 37 23 L 51 21" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.4" />
</svg>
